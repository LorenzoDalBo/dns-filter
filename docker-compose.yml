version: "3.8"

services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: dnsfilter-postgres
    environment:
      POSTGRES_USER: dnsfilter
      POSTGRES_PASSWORD: dnsfilter123
      POSTGRES_DB: dnsfilter
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: dnsfilter-redis
    ports:
      - "6379:6379"

volumes:
  pgdata:
